<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pioneros CRM</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pioneros CRM">
<meta name="theme-color" content="#F58634">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><rect width=%27100%27 height=%27100%27 rx=%2720%27 fill=%27%23F58634%27/><text y=%2778%27 x=%2750%27 text-anchor=%27middle%27 font-size=%2760%27 font-family=%27Arial Black,sans-serif%27 font-weight=%27900%27 fill=%27white%27>C</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F58634;--orange-dark:#F4700D;--orange-bg:#FEF0E6;--orange-text:#7A3800;
  --gray-light:#E6E6E6;--gray-mid:#A09F9F;--gray-dark:#777778;
  --bg:#FFFFFF;--bg2:#F5F5F5;--bg3:#EFEFEF;
  --sidebar-bg:#1A1A1A;--sidebar-text:#E6E6E6;--sidebar-text2:#A09F9F;
  --text:#1A1A1A;--text2:#5A5A5A;--text3:#9A9A9A;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-text:#1D4ED8;
  --green-bg:#F0FDF4;--green-text:#166534;
  --amber-bg:#FFFBEB;--amber-text:#92400E;
  --red-bg:#FEF2F2;--red-text:#991B1B;
  --purple-bg:#F5F3FF;--purple-text:#5B21B6;
  --r:6px;--rl:10px
}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:var(--text);background:var(--bg3);-webkit-text-size-adjust:100%}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--sidebar-bg);padding:16px}
.auth-card{background:var(--bg);border-radius:14px;padding:40px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
.auth-logo{font-size:24px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;margin-bottom:2px}
.auth-logo-sub{font-size:10px;color:var(--gray-mid);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px}
.auth-card h2{font-size:16px;font-weight:600;margin-bottom:20px}
.auth-error{background:var(--red-bg);color:var(--red-text);border-radius:var(--r);padding:8px 12px;font-size:13px;margin-bottom:14px;display:none}
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;transition:transform 0.25s ease;z-index:50}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:flex-start;justify-content:space-between}
.sidebar-logo-title{font-size:18px;font-weight:700;color:var(--orange);letter-spacing:-0.3px;line-height:1.1}
.sidebar-logo-sub{font-size:8px;color:rgba(160,159,159,0.7);letter-spacing:0.2em;text-transform:uppercase;margin-top:3px}
.sidebar-close-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--sidebar-text2);padding:0 4px}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;color:rgba(160,159,159,0.5);padding:14px 18px 5px;letter-spacing:0.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--sidebar-text2);transition:all 0.12s;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--sidebar-text);border-left-color:rgba(245,134,52,0.5)}
.nav-item.active{background:rgba(245,134,52,0.15);color:var(--orange);border-left-color:var(--orange);font-weight:600}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:var(--sidebar-text2);display:flex;justify-content:space-between;align-items:center}
.sidebar-footer span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px}
.menu-btn{display:none;background:none;border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;cursor:pointer;font-size:18px;color:var(--text);line-height:1}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;letter-spacing:0.04em}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,134,52,0.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.12s;font-weight:500}
.btn:hover{background:var(--bg2)}
.btn:active{opacity:0.8}
.btn-primary{background:var(--orange);border-color:var(--orange-dark);color:#fff;font-weight:600}
.btn-primary:hover{background:var(--orange-dark)}
.btn-danger{background:var(--red-bg);border-color:#FECACA;color:var(--red-text)}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:15px}
.btn-sm{padding:4px 10px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;transition:border-color 0.15s,box-shadow 0.15s}
.stat-card:hover{border-color:var(--orange);box-shadow:0 2px 8px rgba(245,134,52,0.1)}
.stat-num{font-size:24px;font-weight:700;margin-bottom:2px}
.stat-label{font-size:11px;color:var(--text2);font-weight:500}
.stat-alert{background:var(--amber-bg);border-color:#FDE68A}
.stat-alert .stat-num{color:var(--amber-text)}
.table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);font-size:10px;background:var(--bg2);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.link-cell{font-weight:600;cursor:pointer;color:var(--orange)}
.link-cell:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-tech{background:#EFF6FF;color:#1D4ED8}
.badge-metric{background:#F0FDF4;color:#166534}
.badge-simax{background:var(--orange-bg);color:var(--orange-dark)}
.badge-multi{background:#F5F3FF;color:#5B21B6}
.badge-pendiente{background:#FFFBEB;color:#92400E}
.badge-enviado{background:#EFF6FF;color:#1D4ED8}
.badge-aprobado{background:#F0FDF4;color:#166534}
.badge-rechazado{background:#FEF2F2;color:#991B1B}
.badge-cerrado{background:#F0FDF4;color:#166534}
.badge-perdido{background:#FEF2F2;color:#991B1B}
.badge-estrategico{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.badge-frecuente{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.badge-reactivo{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.badge-lead{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;border-top:3px solid var(--orange);width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:1}
.modal-header span{font-size:15px;font-weight:600}
.modal-body{padding:18px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px}
.info-item label{display:block;font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid var(--border2);margin:2px;color:var(--text2);background:var(--bg2)}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.checkbox-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;padding:3px 0}
.checkbox-group input[type=checkbox],.checkbox-group input[type=radio]{width:auto}
.notas-box{background:var(--bg2);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text2);margin-top:10px;border-left:3px solid var(--orange)}
/* CHIP SELECTOR */
.chip-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--border2);border-radius:20px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all 0.15s;user-select:none;-webkit-user-select:none;font-weight:500}
.chip:hover{border-color:var(--orange);color:var(--orange)}
.chip.selected{background:var(--orange-bg);border-color:var(--orange);color:var(--orange-dark);font-weight:600}
.chip.selected::before{content:'✓ ';font-weight:700}
.chip-empresa-tech.selected{background:#EFF6FF;border-color:#2563EB;color:#1D4ED8}
.chip-empresa-tech.selected::before{content:'✓ '}
.chip-empresa-metric.selected{background:#F0FDF4;border-color:#16A34A;color:#166534}
.chip-empresa-metric.selected::before{content:'✓ '}
.chip-empresa-simax.selected{background:var(--orange-bg);border-color:var(--orange);color:var(--orange-dark)}
.chip-empresa-simax.selected::before{content:'✓ '}
.pipeline-tab{padding:10px 18px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-weight:500;transition:all 0.12s}
.pipeline-tab:hover{color:var(--text)}
.pipeline-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.pipeline-tabs::-webkit-scrollbar{display:none}
.view-btn{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-weight:500}
.view-btn.active{background:var(--orange);border-color:var(--orange-dark);color:#fff;font-weight:600}
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;min-height:300px;-webkit-overflow-scrolling:touch}
.kanban-col{min-width:175px;max-width:195px;flex-shrink:0;background:var(--bg2);border-radius:var(--rl);padding:12px;display:flex;flex-direction:column;gap:8px}
.kanban-col-header{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:0.08em}
.kanban-col-count{background:rgba(0,0,0,0.08);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--text2)}
.kanban-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all 0.12s}
.kanban-card:hover{border-color:var(--orange);box-shadow:0 2px 10px rgba(245,134,52,0.15);transform:translateY(-1px)}
.kanban-card-name{font-size:13px;font-weight:600;margin-bottom:5px}
.kanban-card-meta{font-size:11px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.kanban-card-value{font-size:12px;font-weight:700;color:var(--orange)}
.kanban-card.alerta{border-left:3px solid #EF4444}
.dias-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--red-bg);color:var(--red-text);font-weight:600}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;transition:border-color 0.12s}
.alert-item:hover{border-color:var(--orange)}
.alert-item-name{font-weight:600}
.alert-item-sub{font-size:11px;color:var(--text2);margin-top:2px}
.alert-badge{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--amber-bg);color:var(--amber-text);white-space:nowrap;margin-left:8px;font-weight:600}
.alert-badge.red{background:var(--red-bg);color:var(--red-text)}
.section-title{font-size:11px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-header-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:4px;text-transform:uppercase;letter-spacing:0.06em}
.cal-day{min-height:68px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:5px;font-size:11px}
.cal-day.other-month{background:var(--bg2);opacity:0.5}
.cal-day.today{border-color:var(--orange);border-width:2px}
.cal-day-num{font-weight:600;margin-bottom:3px;font-size:12px}
.cal-day.today .cal-day-num{color:var(--orange)}
.cal-event{background:var(--orange-bg);color:var(--orange-dark);border-radius:3px;padding:1px 5px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:10px;font-weight:500}
.cal-event.grupal{background:#F5F3FF;color:#5B21B6}
.cal-event.visita{background:#F0FDF4;color:#166534}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav-title{font-size:16px;font-weight:700}
.mobile-card-list{display:none;flex-direction:column;gap:10px}
.mobile-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.mobile-card-title{font-weight:600;font-size:14px;margin-bottom:3px}
.mobile-card-sub{font-size:12px;color:var(--text2);margin-bottom:8px}
.mobile-card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:8px}
.mobile-card-actions{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--border)}
@media(max-width:768px){
  #auth-screen{background:var(--sidebar-bg)}
  .auth-card{padding:28px 20px;border-radius:var(--rl)}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50;box-shadow:4px 0 20px rgba(0,0,0,0.4);width:240px;min-width:240px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-close-btn{display:block}
  .sidebar-overlay.active{display:block}
  .menu-btn{display:flex;align-items:center}
  .topbar{padding:0 12px;height:48px}
  .content{padding:12px}
  #search-input{width:100px!important;font-size:14px!important}
  input,select,textarea{font-size:16px!important;padding:10px 12px!important}
  .stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .stat-num{font-size:20px}
  .form-row,.form-row-3{grid-template-columns:1fr!important}
  .dashboard-grid{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .modal-overlay{align-items:flex-end}
  .modal{border-radius:var(--rl) var(--rl) 0 0;max-height:94vh;width:100%;max-width:100%}
  .modal-body{padding:14px 16px}
  .modal-footer{padding:10px 16px;gap:8px}
  .modal-footer .btn{flex:1;justify-content:center;padding:10px}
  .btn-full{padding:14px;font-size:16px}
  .btn-sm{padding:7px 10px;font-size:13px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-wrap table{min-width:520px}
  .mobile-card-list{display:flex}
  .hide-mobile{display:none!important}
  .kanban-board{-webkit-overflow-scrolling:touch}
  .kanban-col{min-width:165px}
  .cal-day{min-height:44px}
  .cal-day-name{font-size:10px;padding:2px}
  .checkbox-group{gap:8px}
  .nav-item{padding:12px 18px;font-size:14px}
  .card{padding:12px}
}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">PIONEROS</div>
    <div class="auth-logo-sub">Ingenieria que transforma</div>
    <h2>Iniciar sesion</h2>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="tu@email.com"></div>
    <div class="form-group"><label>Contrasena</label><input type="password" id="auth-pass" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="login-btn">Ingresar</button>
  </div>
</div>
<div id="app">
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div>
        <div class="sidebar-logo-title">Pioneros CRM</div>
        <div class="sidebar-logo-sub">Grupo Empresario</div>
      </div>
      <button class="sidebar-close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">📊 Dashboard</div>
      <div class="nav-section">Ventas</div>
      <div class="nav-item" id="nav-pipeline" onclick="navigate('pipeline')">🎯 Pipeline</div>
      <div class="nav-item" id="nav-clientes" onclick="navigate('clientes')">👥 Clientes</div>
      <div class="nav-item" id="nav-presupuestos" onclick="navigate('presupuestos')">📄 Presupuestos</div>
      <div class="nav-section">Operaciones</div>
      <div class="nav-item" id="nav-actividades" onclick="navigate('actividades')">📅 Actividades</div>
      <div class="nav-item" id="nav-calendario" onclick="navigate('calendario')">🗓️ Calendario</div>
      <div class="nav-item" id="nav-equipos" onclick="navigate('equipos')">🚜 Equipos</div>
      <div class="nav-item" id="nav-repuestos" onclick="navigate('repuestos')">🔧 Repuestos</div>
      <div class="nav-section">Configuracion</div>
      <div class="nav-item" id="nav-zonas" onclick="navigate('zonas')">🗺️ Zonas</div>
    </div>
    <div class="sidebar-footer">
      <span id="user-email-display"></span>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-btn" onclick="openSidebar()">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">

async function renderDashboard(c){
  const hoy=new Date();
  const hace7=new Date(hoy-7*86400000).toISOString().slice(0,10);
  const hace30=new Date(hoy-30*86400000).toISOString().slice(0,10);
  const[{data:opps},{data:clientes},{data:acts},{data:allOpps},{data:cumples}]=await Promise.all([
    sb.from('oportunidades').select('*').not('etapa','in','("Cerrado","Perdido")').or(`ultimo_contacto.lt.${hace7},ultimo_contacto.is.null`),
    sb.from('clientes').select('id,nombre,telefono'),
    sb.from('actividades').select('cliente_id,fecha').gte('fecha',hoy.toISOString().slice(0,10)),
    sb.from('oportunidades').select('valor_estimado,etapa,pipeline').not('etapa','in','("Cerrado","Perdido")'),
    sb.from('contactos').select('nombre,cumpleanos,clientes(nombre)').not('cumpleanos','is',null)
  ]);
  const sinContacto7=(opps||[]);
  const valorTotal=(allOpps||[]).reduce((s,o)=>s+(Number(o.valor_estimado)||0),0);
  const tareasHoy=(acts||[]).length;
  const totalActivas=(allOpps||[]).length;
  // clientes sin actividad hace 30 dias
  const{data:actsRecientes}=await sb.from('actividades').select('cliente_id').gte('fecha',hace30);
  const cliConActividad=new Set((actsRecientes||[]).map(a=>a.cliente_id));
  const cliSinContacto=(clientes||[]).filter(cl=>!cliConActividad.has(cl.id));
  // cumpleaños proximos 30 dias
  const cumplesPronto=(cumples||[]).filter(ct=>{
    if(!ct.cumpleanos) return false;
    const[,m,d]=ct.cumpleanos.split('-');
    const cumpleEsteAnio=new Date(hoy.getFullYear(),Number(m)-1,Number(d));
    const diff=Math.ceil((cumpleEsteAnio-hoy)/86400000);
    return diff>=0&&diff<=30;
  }).sort((a,b)=>{
    const diffA=Math.ceil((new Date(hoy.getFullYear(),...a.cumpleanos.split('-').slice(1).map((v,i)=>i===0?Number(v)-1:Number(v)))-hoy)/86400000);
    const diffB=Math.ceil((new Date(hoy.getFullYear(),...b.cumpleanos.split('-').slice(1).map((v,i)=>i===0?Number(v)-1:Number(v)))-hoy)/86400000);
    return diffA-diffB;
  });
  c.innerHTML=`
  <div class="stats">
    <div class="stat-card"><div class="stat-num">${totalActivas}</div><div class="stat-label">Oportunidades activas</div></div>
    <div class="stat-card stat-alert"><div class="stat-num">${sinContacto7.length}</div><div class="stat-label">Sin contacto +7 dias</div></div>
    <div class="stat-card stat-alert"><div class="stat-num">${cliSinContacto.length}</div><div class="stat-label">Clientes sin contacto +30d</div></div>
    <div class="stat-card"><div class="stat-num">$${valorTotal.toLocaleString('es-AR')}</div><div class="stat-label">Valor potencial total</div></div>
  </div>
  <div class="dashboard-grid">
    <div>
      <div class="section-title">⚠️ Oportunidades sin contacto hace +7 dias</div>
      <div class="alert-list">
        ${!sinContacto7.length?'<div class="empty" style="padding:16px">Sin alertas</div>':
        sinContacto7.slice(0,8).map(o=>{
          const dias=o.ultimo_contacto?Math.floor((hoy-new Date(o.ultimo_contacto))/86400000):null;
          const origenBadge=o.origen==='cliente'?'<span class="badge badge-metric" style="font-size:10px;margin-right:4px">Cliente</span>':'<span class="badge badge-tech" style="font-size:10px;margin-right:4px">Lead</span>';
          return`<div class="alert-item" onclick="openEditOportunidad('${o.id}')" style="cursor:pointer">
            <div><div class="alert-item-name">${origenBadge}${o.cliente_nombre}</div><div class="alert-item-sub">${o.producto} · ${o.etapa} · ${o.comercial||'-'}</div></div>
            <span class="alert-badge ${dias&&dias>14?'red':''}">${dias?dias+'d sin contacto':'Sin fecha'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      <div class="section-title">👥 Clientes sin actividad hace +30 dias</div>
      <div class="alert-list">
        ${!cliSinContacto.length?'<div class="empty" style="padding:16px">Todos los clientes contactados</div>':
        cliSinContacto.slice(0,6).map(cl=>`<div class="alert-item">
          <div><div class="alert-item-name">${cl.nombre}</div><div class="alert-item-sub">${cl.telefono||'Sin telefono'}</div></div>
          <span class="alert-badge red">+30 dias</span>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div style="margin-top:16px">
    <div class="section-title">🎂 Cumpleanos proximos (30 dias)</div>
    <div class="alert-list">
      ${!cumplesPronto.length?'<div class="empty" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:16px">Sin cumpleanos en los proximos 30 dias</div>':
      cumplesPronto.map(ct=>{
        const[,m,d]=ct.cumpleanos.split('-');
        const cumpleEsteAnio=new Date(hoy.getFullYear(),Number(m)-1,Number(d));
        const diff=Math.ceil((cumpleEsteAnio-hoy)/86400000);
        const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        return`<div class="alert-item">
          <div><div class="alert-item-name">${ct.nombre}</div><div class="alert-item-sub">${ct.clientes?.nombre||''}</div></div>
          <span class="alert-badge ${diff<=7?'red':''}">${diff===0?'Hoy!':diff===1?'Manana':d+' '+meses[Number(m)-1]} ${diff>1?'('+diff+'d)':''}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

  if(pipelineView==='kanban'){

      ${items.map(o=>{
        const dias=o.ultimo_contacto?Math.floor((hoy-new Date(o.ultimo_contacto))/86400000):null;
        const alerta=dias&&dias>7;
        return`<div class="kanban-card${alerta?' alerta':''}" onclick="openEditOportunidad('${o.id}')">
          <div class="kanban-card-name">${o.cliente_nombre}</div>
          <div style="margin-bottom:4px"><span class="badge badge-${o.producto==='Limagrain'?'metric':o.producto==='XAG'?'tech':'simax'}" style="font-size:10px">${o.producto}</span> <span class="badge" style="font-size:10px;background:${o.origen==='cliente'?'var(--green-bg)':'var(--blue-bg)'};color:${o.origen==='cliente'?'var(--green-text)':'var(--blue-text)'}">${o.origen==='cliente'?'Cliente':'Lead'}</span></div>

          ${alerta?`<div style="margin-top:4px"><span class="dias-badge">${dias}d sin contacto</span></div>`:''}

          <td>${o.comercial||'-'}</td>

        </tr>`;
      }).join('')}</tbody></table>`}
    </div>`;
    document.getElementById('main-content').innerHTML+=tabla;
  }

function updateEtapas(){

async function saveOportunidad(id){
  const nombre=document.getElementById('o-nombre').value.trim();
  if(!nombre){alert('El nombre es obligatorio.');return;}
  const prod=document.getElementById('o-producto').value;
  const obj={
    cliente_nombre:nombre,
    cliente_telefono:document.getElementById('o-tel').value.trim(),
    tipo_cliente:document.getElementById('o-tipo').value,
    producto:prod,
    pipeline:getPipelineDeProducto(prod),
    etapa:document.getElementById('o-etapa').value,
    valor_estimado:Number(document.getElementById('o-valor').value)||null,
    responsable_relacion:document.getElementById('o-resp').value.trim(),
    comercial:document.getElementById('o-comercial').value.trim(),
    ultimo_contacto:document.getElementById('o-contacto').value,
    notas:document.getElementById('o-notas').value.trim(),
    created_by:user.id
  };
  if(id) await sb.from('oportunidades').update(obj).eq('id',id);
  else await sb.from('oportunidades').insert(obj);
  closeModal();render();
}

function categoriaBadge(cat){

async function renderCalendario(c){
  const hoy=new Date();
  const anio=calAnio||hoy.getFullYear();
  const mes=calMes!==undefined?calMes:hoy.getMonth();
  calAnio=anio;calMes=mes;
  const primerDia=new Date(anio,mes,1);
  const ultimoDia=new Date(anio,mes+1,0);
  const desde=new Date(anio,mes,1-primerDia.getDay());
  const hasta=new Date(anio,mes+1,7-ultimoDia.getDay());
  const{data:acts}=await sb.from('actividades').select('*,clientes(nombre)')
    .gte('fecha',desde.toISOString().slice(0,10))
    .lte('fecha',hasta.toISOString().slice(0,10))
    .order('fecha');
  const actsPorDia={};
  (acts||[]).forEach(a=>{
    if(!actsPorDia[a.fecha])actsPorDia[a.fecha]=[];
    actsPorDia[a.fecha].push(a);
  });
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const diasNombre=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  const todayStr=hoy.toISOString().slice(0,10);
  // Actividades futuras (lista)
  const{data:futuras}=await sb.from('actividades').select('*,clientes(nombre)')
    .gte('fecha',todayStr).order('fecha').limit(20);
  c.innerHTML=`
  <div class="cal-nav">
    <button class="btn btn-sm" onclick="calMes--;if(calMes<0){calMes=11;calAnio--;}render()">←</button>
    <div class="cal-nav-title">${meses[mes]} ${anio}</div>
    <button class="btn btn-sm" onclick="calMes++;if(calMes>11){calMes=0;calAnio++;}render()">→</button>
    <button class="btn btn-sm" onclick="calAnio=${hoy.getFullYear()};calMes=${hoy.getMonth()};render()" style="margin-left:8px">Hoy</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">
    <div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${diasNombre.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:4px;text-transform:uppercase;letter-spacing:0.05em">${d}</div>`).join('')}</div>
      <div class="cal-grid">
        ${Array.from({length:42},(_,i)=>{
          const d=new Date(desde);d.setDate(desde.getDate()+i);
          const dStr=d.toISOString().slice(0,10);
          const esEsteMes=d.getMonth()===mes;
          const esHoy=dStr===todayStr;
          const eventos=actsPorDia[dStr]||[];
          return`<div class="cal-day ${!esEsteMes?'other-month':''} ${esHoy?'today':''}">
            <div class="cal-day-num" style="${esHoy?'color:var(--blue)':''}">${d.getDate()}</div>
            ${eventos.slice(0,3).map(a=>`<div class="cal-event ${a.es_grupal?'grupal':a.tipo==='visita'?'visita':''}" title="${a.titulo||a.clientes?.nombre||a.invitados||''}" onclick="alert('${(a.titulo||a.clientes?.nombre||a.invitados||'').replace(/'/g,"\\'")}\\n${a.descripcion||''}')">
              ${a.es_grupal?'👥':''}${a.titulo||a.clientes?.nombre||a.invitados||'Actividad'}
            </div>`).join('')}
            ${eventos.length>3?`<div style="font-size:10px;color:var(--text2)">+${eventos.length-3} mas</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      <div class="card-title" style="margin-bottom:10px">📋 Proximas actividades</div>
      <div class="alert-list">
        ${!(futuras&&futuras.length)?'<div class="empty" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:12px">Sin actividades futuras</div>':
        futuras.map(a=>`<div class="alert-item">
          <div>
            <div class="alert-item-name">${a.es_grupal?'👥 ':''}${a.titulo||a.clientes?.nombre||a.invitados||'Actividad'}</div>
            <div class="alert-item-sub">${actT[a.tipo]||a.tipo}${a.responsable?' · '+a.responsable:''}</div>
          </div>
          <span class="alert-badge" style="white-space:nowrap">${a.fecha}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

let _invitadosSeleccionados=[];
async function buscarClientesInvitados(q){
  const dd=document.getElementById('invitados-dropdown');
  if(!dd) return;
  if(!q||q.length<2){dd.style.display='none';return;}
  const{data:clientes}=await sb.from('clientes').select('id,nombre').ilike('nombre','%'+q+'%').limit(10);
  if(!clientes||!clientes.length){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=clientes.map(cl=>`
    <div onclick="agregarInvitado('${cl.nombre.replace(/'/g,"\\'")}')" 
         style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background 0.1s"
         onmouseover="this.style.background='var(--orange-bg)'" 
         onmouseout="this.style.background='transparent'">
      ${cl.nombre}
    </div>`).join('');
}
function agregarInvitado(nombre){
  const input=document.getElementById('f-invitados');
  const tags=document.getElementById('invitados-tags');
  const dd=document.getElementById('invitados-dropdown');
  if(!tags) return;
  // Avoid duplicates
  const current=tags.querySelectorAll('span[data-nombre]');
  for(const s of current){ if(s.dataset.nombre===nombre) return; }
  const tag=document.createElement('span');
  tag.dataset.nombre=nombre;
  tag.style.cssText='background:var(--orange-bg);color:var(--orange-dark);border:1px solid var(--orange);border-radius:4px;padding:3px 8px;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-weight:500';
  tag.innerHTML=`${nombre} <span onclick="this.parentElement.remove();syncInvitadosInput()" style="cursor:pointer;font-size:15px;line-height:1;opacity:0.7">×</span>`;
  tags.appendChild(tag);
  input.value='';
  dd.style.display='none';
  syncInvitadosInput();
}
function syncInvitadosInput(){
  const tags=document.getElementById('invitados-tags');
  const hidden=document.getElementById('f-invitados-value');
  if(!tags) return;
  const nombres=[...tags.querySelectorAll('span[data-nombre]')].map(s=>s.dataset.nombre);
  if(hidden) hidden.value=nombres.join(', ');
  // Also store in a global for saving
  window._invitadosValue=nombres.join(', ');
  // Actualizar contador
  const counter=document.getElementById('invitados-count');
  if(counter) counter.textContent=nombres.length>0?`(${nombres.length} seleccionados)`:'';
}
function removeInvitadoTag(el){
  el.parentElement.remove();
  syncInvitadosInput();
}
function getInvitadosValue(){
  // Try tags first, then plain input
  const tags=document.getElementById('invitados-tags');
  if(tags){
    const nombres=[...tags.querySelectorAll('span[data-nombre]')].map(s=>s.dataset.nombre);
    if(nombres.length>0) return nombres.join(', ');
  }
  // Fallback: plain text in input
  const input=document.getElementById('f-invitados');
  return input?input.value.trim():window._invitadosValue||'';
}

async function processSynagroFile(event){
  const file=event.target.files[0];
  if(!file)return;
  event.target.value=''; // reset para permitir reimportar mismo archivo
  showModal(`<div class="modal-header"><span>📥 Importar desde Synagro</span><button class="btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div id="import-status" style="text-align:center;padding:20px;color:var(--text2)">Leyendo archivo...</div>
  </div>`);
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    if(!rows.length){
      document.getElementById('import-status').innerHTML='<span style="color:var(--red-text)">El archivo esta vacio o no tiene el formato esperado.</span>';
      return;
    }
    // Mapear columnas — tolerante a mayusculas/minusculas y espacios
    function col(row, ...names){
      for(const n of names){
        const k=Object.keys(row).find(k=>k.trim().toLowerCase()===n.toLowerCase());
        if(k&&row[k]!==undefined&&row[k]!=='') return String(row[k]).trim();
      }
      return '';
    }
    const clientes = rows.map(r=>({
      nombre: col(r,'nombre','razon social','razonsocial') || col(r,'nombre'),
      cuit: col(r,'cuit'),
      telefono: col(r,'telefono','tel'),
      localidad: col(r,'localidad'),
      provincia: col(r,'provincia'),
      email: col(r,'mail','email','e-mail','correo'),
      notas: [col(r,'domicilio')?'Domicilio: '+col(r,'domicilio'):'', col(r,'observaciones')||col(r,'obs')?'Obs: '+(col(r,'observaciones')||col(r,'obs')):'', col(r,'pais')&&col(r,'pais').toLowerCase()!=='argentina'?'Pais: '+col(r,'pais'):''].filter(Boolean).join(' | '),
      codigo_synagro: col(r,'codigo'),
      empresas: [],
      cultivos: [],
      created_by: user.id
    })).filter(cl=>cl.nombre);
    document.getElementById('import-status').innerHTML=`
      <div style="margin-bottom:16px">Se encontraron <strong>${clientes.length} clientes</strong> en el archivo.</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Los clientes con CUIT duplicado seran actualizados. Los nuevos seran creados.</div>
      <button class="btn btn-primary" onclick="confirmarImport(${JSON.stringify(clientes).replace(/"/g,'&quot;')})">Importar ${clientes.length} clientes</button>
      <button class="btn" onclick="closeModal()" style="margin-left:8px">Cancelar</button>`;
  } catch(e) {
    document.getElementById('import-status').innerHTML=`<span style="color:var(--red-text)">Error al leer el archivo. Asegurate de que sea un Excel (.xlsx) exportado de Synagro.</span>`;
  }
}
async function confirmarImport(clientes){
  document.getElementById('import-status').innerHTML=`<div style="text-align:center;padding:20px;color:var(--text2)">Importando 0 de ${clientes.length}...</div>`;
  let creados=0, actualizados=0, errores=0;
  // Obtener CUITs existentes
  const{data:existentes}=await sb.from('clientes').select('id,cuit');
  const cuitMap={};
  (existentes||[]).forEach(c=>{if(c.cuit)cuitMap[c.cuit.replace(/[-.\s]/g,'')]=c.id;});
  for(let i=0;i<clientes.length;i++){
    const cl=clientes[i];
    document.getElementById('import-status').innerHTML=`<div style="text-align:center;padding:20px;color:var(--text2)">Importando ${i+1} de ${clientes.length}...<br><small>${cl.nombre}</small></div>`;
    try{
      const cuitNorm=cl.cuit?cl.cuit.replace(/[-.\s]/g,''):'';
      const existeId=cuitNorm?cuitMap[cuitNorm]:null;
      const obj={
        nombre:cl.nombre,
        cuit:cl.cuit||null,
        telefono:cl.telefono||null,
        email:cl.email||null,
        localidad:cl.localidad||null,
        provincia:cl.provincia||null,
        notas:cl.notas||null,
        empresas:cl.empresas,
        cultivos:cl.cultivos,
        created_by:cl.created_by
      };
      if(existeId){
        await sb.from('clientes').update(obj).eq('id',existeId);
        actualizados++;
      } else {
        await sb.from('clientes').insert(obj);
        creados++;
      }
    } catch(e){ errores++; }
  }
  document.getElementById('import-status').innerHTML=`
    <div style="text-align:center;padding:8px">
      <div style="font-size:32px;margin-bottom:12px">✅</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px">Importacion completada</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8">
        <div>✅ Creados: <strong>${creados}</strong></div>
        <div>🔄 Actualizados: <strong>${actualizados}</strong></div>
        ${errores?`<div style="color:var(--red-text)">⚠️ Errores: ${errores}</div>`:''}
      </div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="closeModal();render()">Ver clientes</button>
    </div>`;
}
</script>
</body>
</html>
