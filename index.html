<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F58634;--orange-dark:#F4700D;--orange-bg:#FEF0E6;--orange-text:#7A3800;
  --gray-light:#E6E6E6;--gray-mid:#A09F9F;--gray-dark:#777778;
  --bg:#FFFFFF;--bg2:#F5F5F5;--bg3:#EFEFEF;
  --sidebar-bg:#1A1A1A;--sidebar-text:#E6E6E6;--sidebar-text2:#A09F9F;
  --text:#1A1A1A;--text2:#5A5A5A;--text3:#9A9A9A;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-text:#1D4ED8;
  --green-bg:#F0FDF4;--green-text:#166534;
  --amber-bg:#FFFBEB;--amber-text:#92400E;
  --red-bg:#FEF2F2;--red-text:#991B1B;
  --purple-bg:#F5F3FF;--purple-text:#5B21B6;
  --r:6px;--rl:10px
}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:var(--text);background:var(--bg3);-webkit-text-size-adjust:100%}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--sidebar-bg);padding:16px}
.auth-card{background:var(--bg);border-radius:14px;padding:40px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
.auth-logo{font-size:24px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;margin-bottom:2px}
.auth-logo-sub{font-size:10px;color:var(--gray-mid);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px}
.auth-card h2{font-size:16px;font-weight:600;margin-bottom:20px}
.auth-error{background:var(--red-bg);color:var(--red-text);border-radius:var(--r);padding:8px 12px;font-size:13px;margin-bottom:14px;display:none}
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;transition:transform 0.25s ease;z-index:50}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:flex-start;justify-content:space-between}
.sidebar-logo-title{font-size:18px;font-weight:700;color:var(--orange);letter-spacing:-0.3px;line-height:1.1}
.sidebar-logo-sub{font-size:8px;color:rgba(160,159,159,0.7);letter-spacing:0.2em;text-transform:uppercase;margin-top:3px}
.sidebar-close-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--sidebar-text2);padding:0 4px}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;color:rgba(160,159,159,0.5);padding:14px 18px 5px;letter-spacing:0.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--sidebar-text2);transition:all 0.12s;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--sidebar-text);border-left-color:rgba(245,134,52,0.5)}
.nav-item.active{background:rgba(245,134,52,0.15);color:var(--orange);border-left-color:var(--orange);font-weight:600}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:var(--sidebar-text2);display:flex;justify-content:space-between;align-items:center}
.sidebar-footer span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px}
.menu-btn{display:none;background:none;border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;cursor:pointer;font-size:18px;color:var(--text);line-height:1}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;letter-spacing:0.04em}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,134,52,0.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.12s;font-weight:500}
.btn:hover{background:var(--bg2)}
.btn:active{opacity:0.8}
.btn-primary{background:var(--orange);border-color:var(--orange-dark);color:#fff;font-weight:600}
.btn-primary:hover{background:var(--orange-dark)}
.btn-danger{background:var(--red-bg);border-color:#FECACA;color:var(--red-text)}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:15px}
.btn-sm{padding:4px 10px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;transition:border-color 0.15s,box-shadow 0.15s}
.stat-card:hover{border-color:var(--orange);box-shadow:0 2px 8px rgba(245,134,52,0.1)}
.stat-num{font-size:24px;font-weight:700;margin-bottom:2px}

function getPipelineDeProducto(prod){
  if(prod==='Limagrain') return 'semillas';
  if(prod==='Stara') return 'maquinarias';
  return 'tecnologia';
}
function getEtapasDeProducto(prod){
  return PIPELINES[getPipelineDeProducto(prod)].etapas;

async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('auth-error');
  err.style.display='none';btn.textContent='Ingresando...';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Email o contrasena incorrectos.';err.style.display='block';btn.textContent='Ingresar';btn.disabled=false;}
  else{user=data.user;showApp();}
}
async function doLogout(){await sb.auth.signOut();document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex';user=null;}
function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-email-display').textContent=user.email;
  sb.from('zonas').select('*').order('orden').then(({data})=>{zonasList=data||[];});
  sb.from('proveedores').select('*').order('orden').then(({data})=>{proveedoresList=data||[];});
  navigate('dashboard');
}
sb.auth.getSession().then(({data:{session}})=>{if(session){user=session.user;showApp();}});

function navigate(p){
  page=p;viewClient=null;
  if(p!=='clientes') window._clienteCatFilter=null;
  if(p!=='presupuestos') window._presupEstadoFilter=null;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+p);if(nav)nav.classList.add('active');
  const titles={dashboard:'Dashboard',pipeline:'Pipeline',clientes:'Clientes',actividades:'Actividades',calendario:'Calendario',equipos:'Equipos',presupuestos:'Presupuestos',repuestos:'Repuestos',zonas:'Zonas'};
  document.getElementById('page-title').textContent=titles[p]||p;
  document.getElementById('search-input').value='';
  const btnN=document.getElementById('btn-nuevo');
  btnN.style.display=(p==='dashboard'||p==='zonas'||p==='calendario')?'none':'inline-flex';
  const btnI=document.getElementById('btn-importar');
  btnI.style.display=(p==='clientes')?'inline-flex':'none';
  closeSidebar();
  render();

function filterList(){render();}
async function render(){
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading">Cargando...</div>';
  if(page==='dashboard') await renderDashboard(c);
  else if(page==='pipeline') await renderPipeline(c);
  else if(page==='clientes'){if(viewClient)await renderDetail(c);else await renderClientes(c);}
  else if(page==='actividades') await renderActividades(c);
  else if(page==='equipos') await renderEquipos(c);
  else if(page==='presupuestos') await renderPresupuestos(c);
  else if(page==='repuestos') await renderRepuestos(c);
  else if(page==='zonas') await renderZonas(c);
  else if(page==='calendario') await renderCalendario(c);
}

async function renderDashboard(c){
  const hoy=new Date();
  const hace7=new Date(hoy-7*86400000).toISOString().slice(0,10);
  const hace30=new Date(hoy-30*86400000).toISOString().slice(0,10);
  const[{data:opps},{data:clientes},{data:acts},{data:allOpps},{data:cumples}]=await Promise.all([
    sb.from('oportunidades').select('*').not('etapa','in','("Cerrado","Perdido")').or(`ultimo_contacto.lt.${hace7},ultimo_contacto.is.null`),
    sb.from('clientes').select('id,nombre,telefono'),
    sb.from('actividades').select('cliente_id,fecha').gte('fecha',hoy.toISOString().slice(0,10)),
    sb.from('oportunidades').select('valor_estimado,etapa,pipeline').not('etapa','in','("Cerrado","Perdido")'),
    sb.from('contactos').select('nombre,cumpleanos,clientes(nombre)').not('cumpleanos','is',null)
  ]);
  const sinContacto7=(opps||[]);
  const valorTotal=(allOpps||[]).reduce((s,o)=>s+(Number(o.valor_estimado)||0),0);
  const tareasHoy=(acts||[]).length;
  const totalActivas=(allOpps||[]).length;
  // clientes sin actividad hace 30 dias
  const{data:actsRecientes}=await sb.from('actividades').select('cliente_id').gte('fecha',hace30);
  const cliConActividad=new Set((actsRecientes||[]).map(a=>a.cliente_id));
  const cliSinContacto=(clientes||[]).filter(cl=>!cliConActividad.has(cl.id));
  // cumpleaños proximos 30 dias
  const cumplesPronto=(cumples||[]).filter(ct=>{
    if(!ct.cumpleanos) return false;
    const[,m,d]=ct.cumpleanos.split('-');
    const cumpleEsteAnio=new Date(hoy.getFullYear(),Number(m)-1,Number(d));
    const diff=Math.ceil((cumpleEsteAnio-hoy)/86400000);
    return diff>=0&&diff<=30;
  }).sort((a,b)=>{
    const diffA=Math.ceil((new Date(hoy.getFullYear(),...a.cumpleanos.split('-').slice(1).map((v,i)=>i===0?Number(v)-1:Number(v)))-hoy)/86400000);
    const diffB=Math.ceil((new Date(hoy.getFullYear(),...b.cumpleanos.split('-').slice(1).map((v,i)=>i===0?Number(v)-1:Number(v)))-hoy)/86400000);
    return diffA-diffB;
  });
  c.innerHTML=`
  <div class="stats">
    <div class="stat-card" style="cursor:pointer" onclick="navigate('pipeline')" title="Ver pipeline">
      <div class="stat-num">${totalActivas}</div><div class="stat-label">Oportunidades activas ↗</div>
    </div>
    <div class="stat-card stat-alert" style="cursor:pointer" onclick="navigate('pipeline')" title="Ver en pipeline">
      <div class="stat-num">${sinContacto7.length}</div><div class="stat-label">Sin contacto +7 dias ↗</div>
    </div>
    <div class="stat-card stat-alert" style="cursor:pointer" onclick="navigate('clientes')" title="Ver clientes">
      <div class="stat-num">${cliSinContacto.length}</div><div class="stat-label">Clientes sin contacto +30d ↗</div>
    </div>
    <div class="stat-card" style="cursor:pointer" onclick="navigate('pipeline')" title="Ver pipeline">
      <div class="stat-num">$${valorTotal.toLocaleString('es-AR')}</div><div class="stat-label">Valor potencial total ↗</div>
    </div>
  </div>
  <div class="dashboard-grid">
    <div>
      <div class="section-title">⚠️ Oportunidades sin contacto hace +7 dias</div>
      <div class="alert-list">
        ${!sinContacto7.length?'<div class="empty" style="padding:16px">Sin alertas</div>':
        sinContacto7.slice(0,8).map(o=>{
          const dias=o.ultimo_contacto?Math.floor((hoy-new Date(o.ultimo_contacto))/86400000):null;
          const origenBadge=o.origen==='cliente'?'<span class="badge badge-metric" style="font-size:10px;margin-right:4px">Cliente</span>':'<span class="badge badge-tech" style="font-size:10px;margin-right:4px">Lead</span>';
          return`<div class="alert-item" onclick="openEditOportunidad('${o.id}')" style="cursor:pointer">
            <div><div class="alert-item-name">${origenBadge}${o.cliente_nombre}</div><div class="alert-item-sub">${o.producto} · ${o.etapa} · ${o.comercial||'-'}</div></div>
            <span class="alert-badge ${dias&&dias>14?'red':''}">${dias?dias+'d sin contacto':'Sin fecha'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      <div class="section-title">👥 Clientes sin actividad hace +30 dias</div>
      <div class="alert-list">
        ${!cliSinContacto.length?'<div class="empty" style="padding:16px">Todos los clientes contactados</div>':
        cliSinContacto.slice(0,6).map(cl=>`<div class="alert-item">
          <div><div class="alert-item-name">${cl.nombre}</div><div class="alert-item-sub">${cl.telefono||'Sin telefono'}</div></div>
          <span class="alert-badge red">+30 dias</span>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div style="margin-top:16px">
    <div class="section-title">🎂 Cumpleanos proximos (30 dias)</div>
    <div class="alert-list">
      ${!cumplesPronto.length?'<div class="empty" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:16px">Sin cumpleanos en los proximos 30 dias</div>':
      cumplesPronto.map(ct=>{
        const[,m,d]=ct.cumpleanos.split('-');
        const cumpleEsteAnio=new Date(hoy.getFullYear(),Number(m)-1,Number(d));
        const diff=Math.ceil((cumpleEsteAnio-hoy)/86400000);
        const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        return`<div class="alert-item">
          <div><div class="alert-item-name">${ct.nombre}</div><div class="alert-item-sub">${ct.clientes?.nombre||''}</div></div>
          <span class="alert-badge ${diff<=7?'red':''}">${diff===0?'Hoy!':diff===1?'Manana':d+' '+meses[Number(m)-1]} ${diff>1?'('+diff+'d)':''}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

async function savePresupDesdeOpp(oppId, clienteId){
  const cid=document.getElementById('f-cliente').value||clienteId;
  if(!cid){alert('Selecciona un cliente.');return;}
  const estado=document.getElementById('f-estado').value;
  // Crear presupuesto vinculado
  await sb.from('presupuestos').insert({
    cliente_id:cid,
    oportunidad_id:oppId,
    fecha:document.getElementById('f-fecha').value,
    numero:document.getElementById('f-nro').value.trim(),
    importe:Number(document.getElementById('f-importe').value)||null,
    descripcion:document.getElementById('f-desc').value.trim(),
    estado,
    linea_producto:document.getElementById('f-empresa-presup').value||null,
    proveedor:getProveedorValue(),
    created_by:user.id
  });
  // Actualizar etapa de la oportunidad según estado del presupuesto
  let nuevaEtapa='Presupuesto enviado';
  if(estado==='aprobado') nuevaEtapa='Cerrado';
  if(estado==='rechazado') nuevaEtapa='Perdido';
  await sb.from('oportunidades').update({
    etapa:nuevaEtapa,
    ultimo_contacto:document.getElementById('f-fecha').value
  }).eq('id',oppId);
  closeModal();render();
}

async function saveOportunidad(id){

async function renderCalendario(c){
  const hoy=new Date();
  const anio=calAnio||hoy.getFullYear();
  const mes=calMes!==undefined?calMes:hoy.getMonth();
  calAnio=anio;calMes=mes;
  const primerDia=new Date(anio,mes,1);
  const ultimoDia=new Date(anio,mes+1,0);
  const desde=new Date(anio,mes,1-primerDia.getDay());
  const hasta=new Date(anio,mes+1,7-ultimoDia.getDay());
  const{data:acts}=await sb.from('actividades').select('*,clientes(nombre)')
    .gte('fecha',desde.toISOString().slice(0,10))
    .lte('fecha',hasta.toISOString().slice(0,10))
    .order('fecha');
  const actsPorDia={};
  (acts||[]).forEach(a=>{
    if(!actsPorDia[a.fecha])actsPorDia[a.fecha]=[];
    actsPorDia[a.fecha].push(a);
  });
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const diasNombre=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  const todayStr=hoy.toISOString().slice(0,10);
  // Actividades futuras (lista)
  const{data:futuras}=await sb.from('actividades').select('*,clientes(nombre)')
    .gte('fecha',todayStr).order('fecha').limit(20);
  c.innerHTML=`
  <div class="cal-nav">
    <button class="btn btn-sm" onclick="calMes--;if(calMes<0){calMes=11;calAnio--;}render()">←</button>
    <div class="cal-nav-title">${meses[mes]} ${anio}</div>
    <button class="btn btn-sm" onclick="calMes++;if(calMes>11){calMes=0;calAnio++;}render()">→</button>
    <button class="btn btn-sm" onclick="calAnio=${hoy.getFullYear()};calMes=${hoy.getMonth()};render()" style="margin-left:8px">Hoy</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">
    <div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${diasNombre.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:4px;text-transform:uppercase;letter-spacing:0.05em">${d}</div>`).join('')}</div>
      <div class="cal-grid">
        ${Array.from({length:42},(_,i)=>{
          const d=new Date(desde);d.setDate(desde.getDate()+i);
          const dStr=d.toISOString().slice(0,10);
          const esEsteMes=d.getMonth()===mes;
          const esHoy=dStr===todayStr;
          const eventos=actsPorDia[dStr]||[];
          return`<div class="cal-day ${!esEsteMes?'other-month':''} ${esHoy?'today':''}">
            <div class="cal-day-num" style="${esHoy?'color:var(--blue)':''}">${d.getDate()}</div>
            ${eventos.slice(0,3).map(a=>`<div class="cal-event ${a.es_grupal?'grupal':a.tipo==='visita'?'visita':''}" title="${a.titulo||a.clientes?.nombre||a.invitados||''}" onclick="alert('${(a.titulo||a.clientes?.nombre||a.invitados||'').replace(/'/g,"\\'")}\\n${a.descripcion||''}')">
              ${a.es_grupal?'👥':''}${a.titulo||a.clientes?.nombre||a.invitados||'Actividad'}
            </div>`).join('')}
            ${eventos.length>3?`<div style="font-size:10px;color:var(--text2)">+${eventos.length-3} mas</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div>
      <div class="card-title" style="margin-bottom:10px">📋 Proximas actividades</div>
      <div class="alert-list">
        ${!(futuras&&futuras.length)?'<div class="empty" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:12px">Sin actividades futuras</div>':
        futuras.map(a=>`<div class="alert-item">
          <div>
            <div class="alert-item-name">${a.es_grupal?'👥 ':''}${a.titulo||a.clientes?.nombre||a.invitados||'Actividad'}</div>
            <div class="alert-item-sub">${actT[a.tipo]||a.tipo}${a.responsable?' · '+a.responsable:''}</div>
          </div>
          <span class="alert-badge" style="white-space:nowrap">${a.fecha}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

async function buscarClientesInvitados(q){
  const dd=document.getElementById('invitados-dropdown');
  if(!dd) return;
  if(!q||q.length<2){dd.style.display='none';return;}
  const{data:clientes}=await sb.from('clientes').select('id,nombre').ilike('nombre','%'+q+'%').limit(10);
  if(!clientes||!clientes.length){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=clientes.map(cl=>`
    <div onclick="agregarInvitado('${cl.nombre.replace(/'/g,"\\'")}')" 
         style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background 0.1s"
         onmouseover="this.style.background='var(--orange-bg)'" 
         onmouseout="this.style.background='transparent'">
      ${cl.nombre}
    </div>`).join('');
}
function agregarInvitado(nombre){
  const input=document.getElementById('f-invitados');
  const tags=document.getElementById('invitados-tags');
  const dd=document.getElementById('invitados-dropdown');
  if(!tags) return;
  // Avoid duplicates
  const current=tags.querySelectorAll('span[data-nombre]');
  for(const s of current){ if(s.dataset.nombre===nombre) return; }
  const tag=document.createElement('span');
  tag.dataset.nombre=nombre;

function syncInvitadosInput(){
  const tags=document.getElementById('invitados-tags');
  const hidden=document.getElementById('f-invitados-value');
  if(!tags) return;
  const nombres=[...tags.querySelectorAll('span[data-nombre]')].map(s=>s.dataset.nombre);
  if(hidden) hidden.value=nombres.join(', ');
  // Also store in a global for saving
  window._invitadosValue=nombres.join(', ');
  // Actualizar contador
  const counter=document.getElementById('invitados-count');
  if(counter) counter.textContent=nombres.length>0?`(${nombres.length} seleccionados)`:'';
}
function removeInvitadoTag(el){
  el.parentElement.remove();
  syncInvitadosInput();
}
function getInvitadosValue(){
  // Try tags first, then plain input
  const tags=document.getElementById('invitados-tags');
  if(tags){
    const nombres=[...tags.querySelectorAll('span[data-nombre]')].map(s=>s.dataset.nombre);
    if(nombres.length>0) return nombres.join(', ');
  }
  // Fallback: plain text in input
  const input=document.getElementById('f-invitados');
  return input?input.value.trim():window._invitadosValue||'';
}

    estado,
    linea_producto:document.getElementById('f-empresa-presup').value||null,
    proveedor:getProveedorValue()
  }).eq('id',id);
  // Si tiene oportunidad vinculada, actualizar su etapa
  if(presup?.oportunidad_id){

async function saveContacto(id, clienteId){
  const nombre=document.getElementById('ct-nombre').value.trim();

  const obj={

    nombre,
    cargo:document.getElementById('ct-cargo').value.trim()||null,
    telefono:document.getElementById('ct-tel').value.trim()||null,
    email:document.getElementById('ct-email').value.trim()||null,
    cumpleanos:document.getElementById('ct-cumple').value||null,

// ===================== IMPORTAR SYNAGRO =====================
async function processSynagroFile(event){
  const file=event.target.files[0];
  if(!file)return;
  event.target.value=''; // reset para permitir reimportar mismo archivo
  showModal(`<div class="modal-header"><span>📥 Importar desde Synagro</span><button class="btn" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div id="import-status" style="text-align:center;padding:20px;color:var(--text2)">Leyendo archivo...</div>
  </div>`);
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    if(!rows.length){
      document.getElementById('import-status').innerHTML='<span style="color:var(--red-text)">El archivo esta vacio o no tiene el formato esperado.</span>';
      return;
    }
    // Mapear columnas — tolerante a mayusculas/minusculas y espacios
    function col(row, ...names){
      for(const n of names){
        const k=Object.keys(row).find(k=>k.trim().toLowerCase()===n.toLowerCase());
        if(k&&row[k]!==undefined&&row[k]!=='') return String(row[k]).trim();
      }
      return '';
    }
    const clientes = rows.map(r=>({
      nombre: col(r,'nombre','razon social','razonsocial') || col(r,'nombre'),
      cuit: col(r,'cuit'),
      telefono: col(r,'telefono','tel'),
      localidad: col(r,'localidad'),
      provincia: col(r,'provincia'),
      email: col(r,'mail','email','e-mail','correo'),
      notas: [col(r,'domicilio')?'Domicilio: '+col(r,'domicilio'):'', col(r,'observaciones')||col(r,'obs')?'Obs: '+(col(r,'observaciones')||col(r,'obs')):'', col(r,'pais')&&col(r,'pais').toLowerCase()!=='argentina'?'Pais: '+col(r,'pais'):''].filter(Boolean).join(' | '),
      codigo_synagro: col(r,'codigo'),
      empresas: [],
      cultivos: [],
      created_by: user.id
    })).filter(cl=>cl.nombre);
    document.getElementById('import-status').innerHTML=`
      <div style="margin-bottom:16px">Se encontraron <strong>${clientes.length} clientes</strong> en el archivo.</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Los clientes con CUIT duplicado seran actualizados. Los nuevos seran creados.</div>
      <button class="btn btn-primary" onclick="confirmarImport(${JSON.stringify(clientes).replace(/"/g,'&quot;')})">Importar ${clientes.length} clientes</button>
      <button class="btn" onclick="closeModal()" style="margin-left:8px">Cancelar</button>`;
  } catch(e) {
    document.getElementById('import-status').innerHTML=`<span style="color:var(--red-text)">Error al leer el archivo. Asegurate de que sea un Excel (.xlsx) exportado de Synagro.</span>`;
  }
}
async function confirmarImport(clientes){
  document.getElementById('import-status').innerHTML=`<div style="text-align:center;padding:20px;color:var(--text2)">Importando 0 de ${clientes.length}...</div>`;
  let creados=0, actualizados=0, errores=0;
  // Obtener CUITs existentes
  const{data:existentes}=await sb.from('clientes').select('id,cuit');
  const cuitMap={};
  (existentes||[]).forEach(c=>{if(c.cuit)cuitMap[c.cuit.replace(/[-.\s]/g,'')]=c.id;});
  for(let i=0;i<clientes.length;i++){
    const cl=clientes[i];
    document.getElementById('import-status').innerHTML=`<div style="text-align:center;padding:20px;color:var(--text2)">Importando ${i+1} de ${clientes.length}...<br><small>${cl.nombre}</small></div>`;
    try{
      const cuitNorm=cl.cuit?cl.cuit.replace(/[-.\s]/g,''):'';
      const existeId=cuitNorm?cuitMap[cuitNorm]:null;
      const obj={
        nombre:cl.nombre,
        cuit:cl.cuit||null,
        telefono:cl.telefono||null,
        email:cl.email||null,
        localidad:cl.localidad||null,
        provincia:cl.provincia||null,
        notas:cl.notas||null,
        empresas:cl.empresas,
        cultivos:cl.cultivos,
        created_by:cl.created_by
      };
      if(existeId){
        await sb.from('clientes').update(obj).eq('id',existeId);
        actualizados++;
      } else {
        await sb.from('clientes').insert(obj);
        creados++;
      }
    } catch(e){ errores++; }
  }
  document.getElementById('import-status').innerHTML=`
    <div style="text-align:center;padding:8px">
      <div style="font-size:32px;margin-bottom:12px">✅</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:8px">Importacion completada</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8">
        <div>✅ Creados: <strong>${creados}</strong></div>
        <div>🔄 Actualizados: <strong>${actualizados}</strong></div>
        ${errores?`<div style="color:var(--red-text)">⚠️ Errores: ${errores}</div>`:''}
      </div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="closeModal();render()">Ver clientes</button>
    </div>`;
}
</script>
